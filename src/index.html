<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IA Orienta</title>
    <meta name="description" content="Prototipo de alta resolución para alfabetización, orientación y recomendación de herramientas de IA.">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
  </head>
  <body>
    <div class="app-shell">
      <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>
      <aside class="sidebar" id="sidebar" aria-label="Navegación principal">
        <div class="sidebar-header">
          <a class="brand" href="#/" aria-label="Ir al inicio">
            <span class="brand-mark">IA</span>
            <span>
              <strong>IA Orienta</strong>
              <small>Prototipo de Alta Resolución</small>
            </span>
          </a>
          <button class="icon-button sidebar-close" type="button" aria-label="Cerrar menú" data-sidebar-close>
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <nav class="nav-list" id="main-nav"></nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div class="topbar-actions">
            <button class="icon-button menu-toggle" type="button" aria-label="Abrir menú" aria-controls="sidebar" aria-expanded="false" data-sidebar-open>
              <span aria-hidden="true">☰</span>
            </button>
            <button class="icon-button back-button" type="button" aria-label="Volver a la vista anterior" data-route-back>
              <span aria-hidden="true">‹</span>
            </button>
          </div>
          <div>
            <p class="eyebrow">Alfabetización y guía en IA</p>
            <h1 id="page-title">IA Orienta</h1>
          </div>
          <a class="ghost-button" href="#/favoritos">Favoritos</a>
        </header>
        <section id="app" class="view" aria-live="polite"></section>
      </main>
    </div>

    <script src="./js/data.js"></script>
    <script src="./js/views/home.js"></script>
    <script src="./js/views/profile.js"></script>
    <script src="./js/views/diagnosis.js"></script>
    <script src="./js/views/recommendation.js"></script>
    <script src="./js/views/explorer.js"></script>
    <script src="./js/views/prompts.js"></script>
    <script src="./js/views/learning.js"></script>
    <script src="./js/views/favorites.js"></script>
    <script src="./js/router.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
